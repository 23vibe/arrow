  <script>
    const form = document.getElementById("contactForm");
    const status = document.getElementById("status");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      status.textContent = "Sending...";
      const payload = Object.fromEntries(new FormData(form).entries());

      try {
        const res = await fetch("/api/sendEmail", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        if (res.ok) {
          status.textContent = "Message sent. Thank you!";
          form.reset();
        } else {
          const text = await res.text();
          status.textContent = `Error: ${text || "Failed to send"}`;
        }
      } catch (err) {
        status.textContent = "Network error. Please try again.";
      }
    });
  </script>
	<script>
	Promise.all([
		fetch('static/images/manifest.json').then(function (r) { return r.json(); }),
		fetch('static/info.txt').then(function (r) { return r.text(); })
	]).then(function (results) {
		var images = results[0].images;
		var infoText = results[1];

		// Fisher-Yates shuffle
		for (var i = images.length - 1; i > 0; i--) {
			var j = Math.floor(Math.random() * (i + 1));
			var tmp = images[i]; images[i] = images[j]; images[j] = tmp;
		}

		// Split info.txt by dot, trim, drop empty
		var sentences = infoText.split('.')
			.map(function (s) { return s.trim(); })
			.filter(function (s) { return s.length > 0; });

		// Build combined items array: images first, then randomly insert text items
		var items = images.map(function (img) { return { type: 'image', name: img }; });
		sentences.forEach(function (sentence) {
			var pos = Math.floor(Math.random() * (items.length + 1));
			items.splice(pos, 0, { type: 'text', text: sentence });
		});

		var gallery = document.getElementById('gallery');
		var modalContent = document.getElementById('modalContent');
		var imageCounter = 0;

		// Render gallery (images + text blocks interleaved)
		items.forEach(function (item) {
			var div = document.createElement('div');
			if (item.type === 'text') {
				div.className = 'grid-item';
				div.innerHTML = '<p>' + item.text + '</p>';
			} else {
				imageCounter++;
				var src = 'static/images/' + encodeURIComponent(item.name);
				div.className = 'grid-item grid-item--height3';
				div.innerHTML = '<div class="column"><img src="' + src + '" onclick="openModal(); currentSlide(' + imageCounter + ');" class="hover-shadow cursor" loading="lazy"></div>';
			}
			gallery.appendChild(div);
		});

		// Build modal slides (images only, in their shuffled order)
		images.forEach(function (img, idx) {
			var src = 'static/images/' + encodeURIComponent(img);
			var div = document.createElement('div');
			div.className = 'mySlides';
			div.setAttribute('onclick', 'closeModal()');
			div.innerHTML = '<div class="numbertext">' + (idx + 1) + ' / ' + images.length + '</div><img src="' + src + '">';
			modalContent.appendChild(div);
		});

		// Add navigation and caption
		modalContent.insertAdjacentHTML('beforeend',
			'<a class="prev" onclick="plusSlides(-1)">&#10094;</a>' +
			'<a class="next" onclick="plusSlides(1)">&#10095;</a>' +
			'<div class="caption-container"><p id="caption"></p></div>'
		);

		// Init Masonry now that all items are in the DOM with known heights
		$(gallery).masonry({
			itemSelector: '.grid-item',
			columnWidth: 225,
			horizontalOrder: true,
			gutter: 0
		});
	}).catch(function (err) {
		console.error('Failed to load resources:', err);
	});
	</script>
